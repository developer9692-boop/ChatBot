<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimpleBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #16161a;
      --surface2:  #1e1e24;
      --border:    #2a2a35;
      --accent:    #7c6aff;
      --accent2:   #c084fc;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --user-bg:   linear-gradient(135deg, #7c6aff, #c084fc);
      --bot-bg:    #1e1e24;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: var(--accent);
      top: -100px; left: -100px;
    }
    body::after {
      width: 300px; height: 300px;
      background: var(--accent2);
      bottom: -80px; right: -80px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 520px;
      height: 88vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }

    .bot-avatar {
      width: 40px; height: 40px;
      background: var(--user-bg);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot   { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user  .msg-avatar { background: var(--user-bg); }
    .message.bot   .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message.user .msg-bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .msg-bubble {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 15px;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #messageInput {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    #messageInput::placeholder { color: var(--muted); }
    #messageInput:focus { border-color: var(--accent); }

    #sendBtn {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--user-bg);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
      font-size: 17px;
    }

    #sendBtn:hover  { transform: scale(1.06); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .welcome {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .welcome strong {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent2);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="header-info">
      <h1>SimpleBot</h1>
      <div class="status">
        <span class="status-dot"></span>
        Online &amp; ready
      </div>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="welcome">
      <strong>// SIMPLEBOT v1.0</strong>
      Try saying <b>hi</b>, <b>price</b>, or <b>bye</b>
    </div>
  </div>

  <div class="chat-input-area">
    <input
      type="text"
      id="messageInput"
      placeholder="Type a message…"
      autocomplete="off"
    />
    <button id="sendBtn" title="Send">➤</button>
  </div>

</div>

<script>
  // ✅ Live backend URL
  const BACKEND_URL = 'https://backendchatbot-1-382w.onrender.com';

  const chatMessages = document.getElementById('chatMessages');
  const messageInput = document.getElementById('messageInput');
  const sendBtn      = document.getElementById('sendBtn');

  function appendMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '🧑' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    scrollToBottom();
  }

  function showTyping() {
    const indicator = document.createElement('div');
    indicator.className = 'message bot';
    indicator.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble typing-indicator';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    indicator.appendChild(avatar);
    indicator.appendChild(bubble);
    chatMessages.appendChild(indicator);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    messageInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      appendMessage(data.reply, 'bot');
    } catch (err) {
      removeTyping();
      appendMessage('⚠️ Server is waking up, please try again in 30 seconds.', 'bot');
    } finally {
      sendBtn.disabled = false;
      messageInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
